<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>게시글 상세 보기</title>
	<style>
		.board-container { width: 50%; margin: 20px auto; padding: 20px; border: 1px solid #ccc; }
    	.header-info { margin-bottom: 20px; color: #666; font-size: 0.9em; }
    	.content { min-height: 200px; padding: 10px; border-top: 1px solid #eee; border-bottom: 1px solid #eee;}
	</style>
</head>
<body>

<div class="board-container">
	<h2>게시글 상세 내용</h2>
	<!--  제목 영역 -->
	<div>
		<strong>제목: </strong> <span th:text="${board.title}">제목</span>
	</div>


	<!--  작성자 및 시간 정보 영역 -->
	<div class="header-info">
		<strong>작성자: </strong> <span th:text="${board.writer}">홍길동</span>
		<strong>작성일: </strong> <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-28</span>
	</div>
	
	<!--  본문 내용 영역 -->
	<div class="content">
		<p th:text="${board.content}">본문 내용이 여기에 들어갑니다.</p>
	</div>
	
	<!--  하단 버튼 영역  -->
	<div>
		<!--  목록으로 돌아가기 링크 -->
		<a th:href="@{/board/list}"><button>목록으로</button></a>
		
		<!--  나중에 구현할 수정/삭제 버튼 (현재는 주석처리) -->
		<a th:href="@{/board/delete(id=${board.id})}"><button>삭제</button></a>
		<a th:href="@{/board/modify/{id}(id=${board.id})}"><button>수정</button></a>
	</div>
</div>
</body>
</html>
