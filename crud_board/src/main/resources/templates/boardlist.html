<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>게시물 목록</title>
</head>
<body>
	<div class="layout">
		<h2>게시물 목록</h2>
		<table>
			<thead>
				<tr>
					<th>번호</th>
					<th>제목</th>
					<th>작성자</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="board : ${list}">
					<td th:text="${board.id}">1</td>
					<td>
						<a th:href="@{/board/view(id=${board.id})}" th:text="${board.title}">제목 입니다</a>
					</td>
					<td th:text="${board.writer}">작성자</td>
				</tr>
			</tbody>
		</table>
		<br>
		<a href="/board/write">글쓰기</a>
	</div>
</body>
</html>
